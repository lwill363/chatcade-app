name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  DATABASE_URL: "postgresql://user:password@localhost:5432/dummy"
  AWS_REGION: us-east-1
  APP_NAME: chatcade
  APP_ENV: prod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "yarn"
          cache-dependency-path: |
            backend/yarn.lock
            frontend/yarn.lock

      - name: Install backend deps
        working-directory: backend
        run: yarn install --immutable

      - name: Generate prisma client
        working-directory: backend
        run: yarn prisma generate

      - name: Run backend tests
        working-directory: backend
        run: yarn test --run

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --immutable

      - name: Run frontend tests
        working-directory: frontend
        run: yarn test --run

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      base_image_uri: ${{ steps.image_uri.outputs.base_image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: account
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Set image URI
        id: image_uri
        run: echo "base_image_uri=${{ steps.account.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.APP_NAME }}:${{ env.APP_NAME }}" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: backend
        run: |
          docker build \
            -t ${{ steps.image_uri.outputs.base_image_uri }}-latest \
            -t ${{ steps.image_uri.outputs.base_image_uri }}-${{ github.sha }} .
          docker push ${{ steps.image_uri.outputs.base_image_uri }}-latest
          docker push ${{ steps.image_uri.outputs.base_image_uri }}-${{ github.sha }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "yarn"
          cache-dependency-path: backend/yarn.lock

      - name: Install backend deps
        working-directory: backend
        run: yarn install --immutable

      - name: Generate prisma client
        working-directory: backend
        run: yarn prisma generate

      - name: Build Lambdas
        run: |
          cd backend
          mkdir -p dist
          find src/features -name "*-handler.ts" | while read handler; do
            name=$(basename "$handler" | sed 's/-handler.ts//')
            mkdir -p "dist/$name"
            yarn dlx esbuild "$handler" \
              --bundle \
              --platform=node \
              --target=node24 \
              --outfile="dist/$name/index.js"
          done

      - name: Zip Lambdas
        run: |
          cd backend/dist
          for dir in *; do
            (cd "$dir" && zip -r "../$dir.zip" .)
          done

      - name: Upload Lambda zips
        uses: actions/upload-artifact@v7
        with:
          name: lambda-zips
          path: backend/dist/*.zip

  infra:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      public_subnet_ids: ${{ steps.tfout.outputs.public_subnet_ids }}
      migration_ecs_security_group_id: ${{ steps.tfout.outputs.migration_ecs_security_group_id }}
      api_gateway_url: ${{ steps.tfout.outputs.api_gateway_url }}
      ws_url: ${{ steps.tfout.outputs.ws_url }}
      frontend_bucket: ${{ steps.tfout.outputs.frontend_bucket }}
      frontend_distribution_id: ${{ steps.tfout.outputs.frontend_distribution_id }}
      frontend_url: ${{ steps.tfout.outputs.frontend_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Lambda zips
        uses: actions/download-artifact@v8
        with:
          name: lambda-zips
          path: backend/dist/

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/terraform
        run: |
          terraform plan \
            -var="image_uri=${{ needs.build.outputs.base_image_uri }}-${{ github.sha }}" \
            -var="alarm_email=${{ secrets.ALARM_EMAIL }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply tfplan

      - name: Get Terraform Outputs
        id: tfout
        working-directory: infra/terraform
        run: |
          echo "public_subnet_ids=$(terraform output -json public_subnet_ids | jq -r '.[]' | paste -sd, -)" >> $GITHUB_OUTPUT
          echo "migration_ecs_security_group_id=$(terraform output migration_ecs_security_group_id)" >> $GITHUB_OUTPUT
          echo "api_gateway_url=$(terraform output -raw api_gateway_url)" >> $GITHUB_OUTPUT
          echo "ws_url=$(terraform output -raw ws_url)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> $GITHUB_OUTPUT
          echo "frontend_distribution_id=$(terraform output -raw frontend_distribution_id)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: [build, infra]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend deps
        working-directory: frontend
        run: yarn install --immutable

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_WS_URL: ${{ needs.infra.outputs.ws_url }}
        run: yarn build

      - name: Deploy frontend to S3 and invalidate CloudFront
        run: |
          aws s3 sync frontend/dist/ s3://${{ needs.infra.outputs.frontend_bucket }}/ --delete
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.infra.outputs.frontend_distribution_id }} \
            --paths "/*"

      - name: Run migrations
        run: |
          aws ecs run-task \
            --cluster ${{ env.APP_NAME }}-${{ env.APP_ENV }}-migration-ecs-ecs-cluster \
            --task-definition ${{ env.APP_NAME }}-${{ env.APP_ENV }}-migration-ecs-ecs-task \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=[${{ needs.infra.outputs.public_subnet_ids }}],
              securityGroups=[${{ needs.infra.outputs.migration_ecs_security_group_id }}],
              assignPublicIp=ENABLED
            }"

      - name: Warm up Lambdas
        run: |
          API="${{ needs.infra.outputs.api_gateway_url }}"
          curl -sf "$API/api/auth/me" || true
          curl -sf "$API/api/channels" || true
          curl -sf "$API/api/friends" || true
          curl -sf "$API/api/games" || true
          curl -sf -X POST "$API/api/channels/warmup/messages" || true
          sleep 15

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium webkit --with-deps

      - name: Run E2E tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.infra.outputs.frontend_url }}
        run: yarn test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
