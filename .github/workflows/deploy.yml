name: Build & Deploy Lambdas

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      # Dummy DATABASE_URL for prisma generate (no DB connection required)
      DATABASE_URL: "postgresql://user:password@localhost:5432/dummy"
      AWS_REGION: us-east-1
      APP_NAME: chatcade
      APP_ENV: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::REDACTED_ACCOUNT_ID:role/GitHubTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        run: echo "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Get image uri
        run: echo "BASE_IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$APP_NAME:$APP_NAME" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        working-directory: backend
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t $BASE_IMAGE_URI-latest -t $BASE_IMAGE_URI-${{ github.sha }} .
          docker push $BASE_IMAGE_URI-latest
          docker push $BASE_IMAGE_URI-${{ github.sha }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install backend deps
        working-directory: backend
        run: yarn install --immutable

      - name: Generate prisma client
        working-directory: backend
        run: yarn prisma generate

      - name: Build Lambdas
        run: |
          cd backend

          mkdir -p dist

          find src/features -name "*-handler.ts" | while read handler; do
            name=$(basename "$handler" | sed 's/-handler.ts//')

            mkdir -p "dist/$name"

            yarn dlx esbuild "$handler" \
              --bundle \
              --platform=node \
              --target=node22 \
              --outfile="dist/$name/index.js"
          done

      - name: Zip Lambdas
        run: |
          cd backend/dist

          for dir in *; do
            (cd "$dir" && zip -r "../$dir.zip" .)
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/terraform
        run: terraform plan -var="image_uri=$BASE_IMAGE_URI-${{ github.sha }}" -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        if: github.ref == 'refs/heads/main'
        run: terraform apply tfplan

      - name: Get Terraform Outputs
        id: tfout
        working-directory: infra/terraform
        if: github.ref == 'refs/heads/main'
        run: |
          echo "public_subnet_ids=$(terraform output -json public_subnet_ids | jq -r '.[]' | paste -sd, -)" >> $GITHUB_OUTPUT
          echo "migration_ecs_security_group_id=$(terraform output migration_ecs_security_group_id)" >> $GITHUB_OUTPUT
          echo "api_gateway_url=$(terraform output -raw api_gateway_url)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> $GITHUB_OUTPUT
          echo "frontend_distribution_id=$(terraform output -raw frontend_distribution_id)" >> $GITHUB_OUTPUT

      - name: Install frontend deps
        working-directory: frontend
        if: github.ref == 'refs/heads/main'
        run: yarn install --immutable

      - name: Build frontend
        working-directory: frontend
        if: github.ref == 'refs/heads/main'
        env:
          VITE_API_BASE_URL: ${{ steps.tfout.outputs.api_gateway_url }}
        run: yarn build

      - name: Deploy frontend to S3 and invalidate CloudFront
        if: github.ref == 'refs/heads/main'
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.tfout.outputs.frontend_bucket }}/ --delete
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tfout.outputs.frontend_distribution_id }} \
            --paths "/*"

      - name: Run migrations
        if: github.ref == 'refs/heads/main'
        run: |
          aws ecs run-task \
            --cluster $APP_NAME-$APP_ENV-migration-ecs-ecs-cluster \
            --task-definition $APP_NAME-$APP_ENV-migration-ecs-ecs-task \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=[${{ steps.tfout.outputs.public_subnet_ids }}],
              securityGroups=[${{ steps.tfout.outputs.migration_ecs_security_group_id }}],
              assignPublicIp=ENABLED
            }"
